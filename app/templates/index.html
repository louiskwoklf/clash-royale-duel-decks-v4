{% extends "base.html" %}
{% block content %}
<section class="hero">
  <h1>Clash Royale Duel Decks</h1>
</section>

<section class="panel">
  <div class="panel-header">
    <div>
      <h2>Build Duel Decks</h2>
    </div>
  </div>
  <form id="duel-deck-form" class="query-grid duel-query-grid">
    <label class="slider-field">
      <div class="field-head">
        <span>Days</span>
        <output id="days-value" for="days-input">{{ defaults.days }}</output>
      </div>
      <input id="days-input" type="range" name="days" value="{{ defaults.days }}" min="1" max="7" step="1">
    </label>
    <label>
      <span>Include cards</span>
      <input type="text" name="include" placeholder="hog-rider, earthquake">
    </label>
    <label>
      <span>Exclude cards</span>
      <input type="text" name="exclude" placeholder="mirror">
    </label>
    <button type="submit">Build duel decks</button>
  </form>
</section>

<section class="panel">
  <div class="panel-header">
    <div>
      <h2>Duel Deck Results</h2>
    </div>
  </div>
  <section id="results" class="results duel-results" aria-live="polite"></section>
</section>

<section class="panel">
  <div class="panel-header">
    <div>
      <h2>Ranked Deck Pool</h2>
    </div>
  </div>
  <section id="source-results" class="results source-results" aria-live="polite"></section>
</section>

<section class="panel stats-panel">
  <div class="panel-header">
    <h2>Database Stats</h2>
    <button type="button" class="secondary-button" id="refresh-stats">Refresh stats</button>
  </div>
  <div id="db-stats" class="stats-grid"></div>
</section>

<section class="panel admin">
  <div class="panel-header">
    <h2>Admin Actions</h2>
  </div>
  <div class="admin-section">
    <h3>Ingestion</h3>
    <div class="admin-actions">
      <button type="button" class="admin-button" data-admin-action="sync-cards">Sync cards</button>
      <button type="button" class="admin-button" data-admin-action="seed-players">Seed players</button>
      <button type="button" class="admin-button" data-admin-action="expand-player-pool">Expand player pool</button>
      <button type="button" class="admin-button" data-admin-action="ingest-battles">Ingest battles</button>
    </div>
  </div>
  <div class="admin-section danger-zone">
    <h3>Clear Data</h3>
    <div class="admin-actions">
      <button type="button" class="admin-button secondary-button" data-admin-action="clear-cards" data-confirm="Clear all cards?">Clear cards</button>
      <button type="button" class="admin-button secondary-button" data-admin-action="clear-players" data-confirm="Clear all players? This also removes linked battle records.">Clear players</button>
      <button type="button" class="admin-button secondary-button" data-admin-action="clear-battles" data-confirm="Clear all battles, decks, and battle records?">Clear battle data</button>
      <button type="button" class="admin-button danger-button" data-admin-action="clear-all" data-confirm="Clear everything in the database?">Clear everything</button>
    </div>
  </div>
</section>

<div id="progress-modal" class="progress-modal" hidden>
  <div class="progress-dialog" role="dialog" aria-modal="true" aria-labelledby="progress-title">
    <div class="progress-header">
      <h2 id="progress-title">Working</h2>
      <span id="progress-status" class="progress-status">Running</span>
    </div>
    <div class="progress-track" aria-hidden="true">
      <div id="progress-fill" class="progress-fill"></div>
    </div>
    <div class="progress-meta">
      <span id="progress-percent">0%</span>
    </div>
    <p id="progress-error" class="progress-error" hidden></p>
    <button type="button" id="progress-close" class="secondary-button progress-close" hidden>Close</button>
  </div>
</div>
{% endblock %}
